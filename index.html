<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image To Base64</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:tahoma,sans-serif;
}

body{
    min-height:100vh;
    background:#050510;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:min(950px,100%);
}

h1{
    text-align:center;
    color:#00ffff;
    margin-bottom:20px;

    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

.drop-zone{
    border:2px dashed #00ffff;
    border-radius:25px;
    padding:50px 20px;
    text-align:center;
    color:white;
    cursor:pointer;
    transition:.3s;

    background:rgba(0,255,255,.05);

    box-shadow:
    0 0 10px #00ffff,
    inset 0 0 10px #00ffff;
}

.drop-zone.dragover{
    transform:scale(1.02);

    box-shadow:
    0 0 20px #00ffff,
    0 0 50px #00ffff,
    inset 0 0 20px #00ffff;
}

input[type=file]{
    display:none;
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    flex:1;
    border:none;
    padding:14px;
    border-radius:12px;
    cursor:pointer;

    color:white;
    background:#00bcd4;

    box-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff;
}

.preview{
    text-align:center;
    margin-top:20px;
}

.preview img{
    max-width:250px;
    max-height:250px;
    display:none;
    border-radius:15px;

    box-shadow:
    0 0 20px #00ffff,
    0 0 40px #00ffff;
}

textarea{
    width:100%;
    height:250px;
    margin-top:20px;
    border:none;
    outline:none;
    resize:none;

    border-radius:15px;
    padding:15px;

    background:#101420;
    color:#00ffff;

    box-shadow:
    0 0 10px #00ffff;
}

.info{
    margin-top:10px;
    color:#aaa;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>⚡ Image → Base64 ⚡</h1>

<label class="drop-zone" id="dropZone">

<input
type="file"
id="fileInput"
accept="image/*">

<p>
📸 انتخاب عکس<br>
یا Drag & Drop<br>
یا Paste از Clipboard
</p>

</label>

<div class="buttons">

<button id="pasteBtn">
📋 Paste Image
</button>

<button id="downloadBtn">
📄 دانلود TXT
</button>

<button id="clearBtn">
🗑 پاک کردن
</button>

</div>

<div class="preview">
<img id="preview">
</div>

<textarea
id="output"
placeholder="Base64 اینجا نمایش داده می‌شود...">
</textarea>

<div class="info">
پس از تبدیل روی «دانلود TXT» بزن.
</div>

</div>

<script>

const dropZone =
document.getElementById("dropZone");

const fileInput =
document.getElementById("fileInput");

const output =
document.getElementById("output");

const preview =
document.getElementById("preview");

const pasteBtn =
document.getElementById("pasteBtn");

const downloadBtn =
document.getElementById("downloadBtn");

const clearBtn =
document.getElementById("clearBtn");

function convertFile(file){

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload = e => {

        const dataUrl =
        e.target.result;

        const base64 =
        dataUrl.split(",")[1];

        output.value =
        base64;

        preview.src =
        dataUrl;

        preview.style.display =
        "inline-block";
    };

    reader.readAsDataURL(file);
}

fileInput.addEventListener(
"change",
()=>{
    convertFile(
    fileInput.files[0]
    );
}
);

dropZone.addEventListener(
"dragover",
e=>{
    e.preventDefault();
    dropZone.classList.add(
    "dragover"
    );
}
);

dropZone.addEventListener(
"dragleave",
()=>{
    dropZone.classList.remove(
    "dragover"
    );
}
);

dropZone.addEventListener(
"drop",
e=>{

    e.preventDefault();

    dropZone.classList.remove(
    "dragover"
    );

    convertFile(
    e.dataTransfer.files[0]
    );
}
);

document.addEventListener(
"paste",
e=>{

    const items =
    e.clipboardData?.items;

    if(!items) return;

    for(const item of items){

        if(
        item.type.startsWith(
        "image/"
        )
        ){

            convertFile(
            item.getAsFile()
            );

            break;
        }
    }
}
);

pasteBtn.addEventListener(
"click",
async()=>{

    try{

        const clipboardItems =
        await navigator
        .clipboard
        .read();

        for(
        const item
        of clipboardItems
        ){

            for(
            const type
            of item.types
            ){

                if(
                type.startsWith(
                "image/"
                )
                ){

                    const blob =
                    await item
                    .getType(type);

                    const file =
                    new File(
                    [blob],
                    "clipboard.png",
                    {
                        type
                    });

                    convertFile(file);

                    return;
                }
            }
        }

        alert(
        "عکسی در Clipboard نیست."
        );

    }catch{

        alert(
        "دسترسی Clipboard داده نشده."
        );
    }
}
);

downloadBtn.addEventListener(
"click",
()=>{

    if(
    !output.value.trim()
    ){

        alert(
        "ابتدا یک عکس انتخاب کن."
        );

        return;
    }

    const blob =
    new Blob(
    [output.value],
    {
        type:
        "text/plain;charset=utf-8"
    });

    const url =
    URL.createObjectURL(
    blob
    );

    const a =
    document.createElement(
    "a"
    );

    a.href = url;

    a.download =
    "base64.txt";

    a.click();

    URL.revokeObjectURL(
    url
    );
}
);

clearBtn.addEventListener(
"click",
()=>{

    output.value = "";

    preview.src = "";

    preview.style.display =
    "none";

    fileInput.value = "";
}
);

</script>

</body>
</html>
